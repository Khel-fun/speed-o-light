[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
cache_path = "cache"

# Solidity version
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200

# Testing
[profile.default.fuzz]
runs = 1000

[profile.default.invariant]
runs = 100
deep_fuzz = true

# RPC Endpoints (configure with environment variables)
[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"
sepolia = "${SEPOLIA_RPC_URL}"
base = "${BASE_RPC_URL}"
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"

# Etherscan verification
[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }
sepolia = { key = "${ETHERSCAN_API_KEY}" }
base = { key = "${BASESCAN_API_KEY}" }
base_sepolia = { key = "${BASESCAN_API_KEY}" }

[fmt]
line_length = 100
